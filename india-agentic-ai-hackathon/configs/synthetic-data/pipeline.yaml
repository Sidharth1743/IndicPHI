# Stage scale knobs — change values here, not code.
# Smoke: personas_per_language=1 → 23 personas → 69 docs (S2 expands slots).
# Full target: 120_000 docs, equal across 23 languages (~5_217 each).

targets:
  total_docs: 120000
  languages: 23
  taxonomy_cells: 98

persona_sampling:
  dataset_id: nvidia/Nemotron-Personas-India
  split: en_IN
  seed: 42
  personas_per_language: 1
  docs_per_persona: 3
  max_scan_rows: 250000
  language_codes: null
  languages_config: configs/synthetic-data/languages.yaml
  output_dir: data/generated/s1_persona_sampling
  local_shard_path: data/nemotron-personas-india/en_IN-00000-of-00011.parquet

taxonomy:
  input_jsonl: data/generated/s1_persona_sampling/personas.jsonl
  doc_types_config: configs/synthetic-data/doc_types.yaml
  domains_config: configs/synthetic-data/domains.yaml
  output_dir: data/generated/s2_taxonomy
  seed: 42
  prefer_unique_cell_per_persona: true
  prefer_unique_doc_type_per_persona: true
  prefer_unique_domain_per_persona: true

persona_summary:
  # Compress Nemotron lifestyle fields → short clinical English summary (Sarvam-30B).
  input_jsonl: data/generated/s2_taxonomy/assignments.jsonl
  output_dir: data/generated/s2b_persona_summary
  model: sarvam-30b
  base_url: https://api.sarvam.ai/v1
  api_key_env: SARVAM_API_KEY
  temperature: 0.2
  max_tokens: 256
  reasoning_effort: null
  requests_per_minute: 110
  max_workers: 24
  timeout_s: 120
  narrative_max_chars: 240
  max_docs: null

prompt_construction:
  # Reads summarized assignments; prompts request English-pivot generation.
  input_jsonl: data/generated/s2b_persona_summary/assignments_summarized.jsonl
  entities_config: configs/synthetic-data/entities.yaml
  entity_profiles_config: configs/synthetic-data/entity_profiles.yaml
  annotation_rules_config: configs/synthetic-data/annotation_rules.yaml
  entity_format_examples_config: configs/synthetic-data/entity_format_examples.yaml
  doc_format_examples_config: configs/synthetic-data/doc_format_examples.yaml
  # Keep full Nemotron columns in JSONL; do not dump lifestyle narratives into LLM prompts.
  include_persona_narrative_in_prompt: false
  persona_narrative_max_chars: 180
  require_all_profile_entities: true
  output_dir: data/generated/s3_prompts
  # null = all rows from S2. Set an int for smoke subsets.
  max_docs: null
  language_codes: null

generation:
  # REQUIRED engine: NeMo Data Designer (no silent Sarvam-HTTP bypass).
  engine: data_designer
  # Model endpoint used by Data Designer provider registration.
  # Generator model: Sarvam-105B via Sarvam API (English pivot with inline tags).
  # reasoning_effort: null is serialized as JSON null → reasoning OFF.
  # (Omitting the field leaves Sarvam default reasoning ON — do not omit.)
  # max_tokens: 16384 — enough for long Indic discharge/surgical notes with
  # inline tags. Do NOT set near the 128k context window: that encourages
  # runaway dumps and does not improve clinical quality.
  # Sarvam-105B Business RPM = 120 (ms-llm default tier is 1000 — different).
  # Throttle at 110 + max_workers for concurrent in-flight generations.
  provider: sarvam
  input_jsonl: data/generated/s3_prompts/prompts.jsonl
  output_dir: data/generated/s4_generation
  model: sarvam-105b
  base_url: https://api.sarvam.ai/v1
  api_key_env: SARVAM_API_KEY
  temperature: 0.3
  max_tokens: 16384
  reasoning_effort: null
  requests_per_minute: 110
  max_workers: 24
  timeout_s: 600
  max_docs: null
  empty_content_retries: 2
  reject_truncated: true

translation:
  # Tag-preserving EN → target Indic language (skip English docs).
  input_jsonl: data/generated/s4_generation/documents.jsonl
  output_dir: data/generated/s4b_translation
  model: sarvam-105b
  base_url: https://api.sarvam.ai/v1
  api_key_env: SARVAM_API_KEY
  temperature: 0.2
  max_tokens: 16384
  reasoning_effort: null
  requests_per_minute: 110
  max_workers: 24
  timeout_s: 600
  skip_language_codes: [en]
  max_docs: null

linguistic_judge:
  # Judge: Grok-4.3 via Azure Foundry OpenAI-compatible chat/completions.
  # Auth: Authorization Bearer (AZURE_FOUNDRY_API_KEY; typo fallback listed).
  # Account limits: 500 RPM / 500000 TPM — we throttle RPM only.
  # Receives entity allow-list so valid TYPE names are not flagged invented.
  provider: azure_foundry
  input_jsonl: data/generated/s4b_translation/documents.jsonl
  output_dir: data/generated/s5_linguistic_judge
  model: grok-4.3
  base_url: https://ambedkar-interpreter-resource.services.ai.azure.com/openai/v1
  api_key_env: AZURE_FOUNDRY_API_KEY
  api_key_env_fallbacks:
    - AZURE_FOUNDARY_API_KEY
  entities_config: configs/synthetic-data/entities.yaml
  temperature: 0.0
  max_tokens: 2048
  max_tokens_field: max_tokens
  reasoning_effort: null
  requests_per_minute: 500
  timeout_s: 600
  network_retries: 4
  pass_threshold: 0.7
  max_docs: null

deterministic_auditor:
  # Prefer judge-passed docs; set input to s5 passed.jsonl in normal runs.
  input_jsonl: data/generated/s5_linguistic_judge/passed.jsonl
  entities_config: configs/synthetic-data/entities.yaml
  entity_profiles_config: configs/synthetic-data/entity_profiles.yaml
  output_dir: data/generated/s6_deterministic_auditor
  require_judge_pass: true
  min_dics: 1.0
  max_boundary_corruption_rate: 0.01
  require_all_profile_entities: true
  max_docs: null

curation:
  input_jsonl: data/generated/s6_deterministic_auditor/passed.jsonl
  output_dir: data/generated/s7_s8_curation
  text_field: generated_text
  id_field: document_id
  language_field: document_language_code
  max_docs: null
  dedup:
    # REQUIRED: NeMo Curator FuzzyDeduplicationWorkflow (Ray/GPU).
    # cpu_minhash is disabled in this submission — do not switch silently.
    backend: nemo_curator
    # Dedup on English pivot when present, else PHI-tag-stripped surface text.
    text_mode: english_pivot_or_masked
    jaccard_threshold: 0.8
    char_ngrams: 24
    num_bands: 20
    rows_per_band: 5
    # Curator banding default (used when backend=nemo_curator)
    minhashes_per_band: 13
    seed: 42
    curator_work_dir: artifacts/nemo_curator_dedup
  balancing:
    enabled: true
    # null = equalize down to the scarcest language count after dedup.
    # Full run: set to ~5217 for 120k / 23 languages.
    target_docs_per_language: null
    # Fail if any language has fewer than this many docs after dedup.
    min_docs_per_language: null
    allow_underfill: false

gliner_format:
  input_jsonl: data/generated/s7_s8_curation/curated.jsonl
  output_dir: data/generated/s9_gliner_format
  entities_config: configs/synthetic-data/entities.yaml
  entity_profiles_config: configs/synthetic-data/entity_profiles.yaml
  text_field: generated_text
  id_field: document_id
  # Optional gold JSONL for span P/R/F1 (document_id + ner or spans).
  gold_jsonl: null
  fail_on_token_misalign: true
  max_docs: null

split:
  input_jsonl: data/generated/s9_gliner_format/gliner_docs.jsonl
  output_dir: data/generated/s10_split
  eval_fraction: 0.15
  seed: 42
  persona_id_field: uuid
  language_field: document_language_code

# REQUIRED NeMo Data Designer bridge (S4). No silent HTTP bypass.
data_designer:
  required: true
  engine: data_designer
  seed_path: data/generated/s3_prompts/prompts.parquet
  model_alias: generator
  model_id: sarvam-105b
  # Must match a configured Data Designer ModelProvider name.
  provider: sarvam
  provider_endpoint: https://api.sarvam.ai/v1
  provider_api_key_env: SARVAM_API_KEY
  # Sarvam uses api-subscription-key (not Bearer).
  auth_style: subscription_key
  temperature: 0.3
  max_tokens: 16384
  system_prompt_column: system_prompt
  user_prompt_column: user_prompt
  output_column: generated_text
